
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inbound: SignalWire Lead Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E13;
    --panel: #12161F;
    --panel-alt: #171C27;
    --border: #232A38;
    --text: #E7EAF0;
    --text-muted: #7C8598;
    --text-dim: #4B5468;
    --accent: #37E8A0;
    --accent-dim: #1F7A55;
    --amber: #FF9142;
    --red: #FF5C5C;
    --blue: #5B8CFF;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- top bar ---------- */
  .topbar {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .brand small { color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 6px; }

  .conn {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .signal-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 16px;
  }
  .signal-bars .bar {
    width: 4px;
    background: var(--text-dim);
    border-radius: 1px;
    transition: background 0.2s;
  }
  .signal-bars .bar:nth-child(1) { height: 5px; }
  .signal-bars .bar:nth-child(2) { height: 9px; }
  .signal-bars .bar:nth-child(3) { height: 13px; }
  .signal-bars .bar:nth-child(4) { height: 16px; }
  .signal-bars.live .bar { background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  .signal-bars.live .bar:nth-child(1) { animation-delay: 0s; }
  .signal-bars.live .bar:nth-child(2) { animation-delay: 0.15s; }
  .signal-bars.live .bar:nth-child(3) { animation-delay: 0.3s; }
  .signal-bars.live .bar:nth-child(4) { animation-delay: 0.45s; }
  @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #06110B; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.9; color: #06110B; }
  .btn.small { padding: 4px 9px; font-size: 11px; }

  /* ---------- layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 56px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 18px 16px;
    overflow-y: auto;
  }

  .sidebar h4 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 18px 0 10px;
  }
  .sidebar h4:first-child { margin-top: 0; }

  input[type="text"], input[type="password"], select, textarea {
    width: 100%;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 5px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }

  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-family: var(--mono);
  }

  .status-filter { display: flex; flex-direction: column; gap: 6px; }
  .status-filter label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; cursor: pointer; color: var(--text-muted);
  }
  .status-filter input { width: auto; }

  .count-pill {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 7px;
    color: var(--text-dim);
  }

  /* ---------- main ---------- */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar input[type="text"] { flex: 1; }

  .table-wrap { flex: 1; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    position: sticky; top: 0;
    background: var(--panel);
    text-align: left;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--panel-alt); }
  tbody td { padding: 12px 20px; vertical-align: top; }
  td.time { font-family: var(--mono); color: var(--text-muted); white-space: nowrap; font-size: 12px; }
  td.from { font-family: var(--mono); white-space: nowrap; }
  td.body { color: var(--text); max-width: 420px; }
  td.body .preview {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; color: var(--text-muted);
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 20px;
    display: inline-block;
    white-space: nowrap;
  }
  .badge.new { background: rgba(255,145,66,0.15); color: var(--amber); border: 1px solid rgba(255,145,66,0.4); }
  .badge.contacted { background: rgba(91,140,255,0.15); color: var(--blue); border: 1px solid rgba(91,140,255,0.4); }
  .badge.qualified { background: rgba(55,232,160,0.15); color: var(--accent); border: 1px solid rgba(55,232,160,0.4); }
  .badge.dead { background: rgba(255,92,92,0.15); color: var(--red); border: 1px solid rgba(255,92,92,0.4); }

  .empty, .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* ---------- view tabs ---------- */
  .view-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .view-tab {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    color: var(--accent);
    background: var(--bg);
    border-color: var(--border);
  }

  /* ---------- analytics dashboard ---------- */
  .dash-wrap { flex: 1; overflow-y: auto; padding: 20px; }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .kpi-card .label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .kpi-card .value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .kpi-card .value.accent { color: var(--accent); }
  .kpi-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-family: var(--mono); }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .chart-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-card h4 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 4px;
  }
  .chart-card .chart-note { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; font-family: var(--mono); }
  .chart-card svg text { font-family: var(--mono); fill: var(--text-dim); }
  .bar-tip { cursor: default; }

  /* ---------- connect gate ---------- */
  .connect-gate {
    max-width: 420px;
    margin: 80px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
  }
  .connect-gate h2 { font-family: var(--mono); font-size: 16px; margin: 0 0 6px; }
  .connect-gate p { color: var(--text-muted); font-size: 13px; margin: 0 0 20px; line-height: 1.5; }
  .connect-gate .field { margin-bottom: 14px; }
  .connect-gate .btn.primary { width: 100%; padding: 10px; margin-top: 4px; }
  .error-msg { color: var(--red); font-size: 12px; margin-top: 10px; font-family: var(--mono); }

  /* ---------- slide-over ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; z-index: 10;
  }
  .overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -420px; width: 420px; height: 100vh;
    background: var(--panel); border-left: 1px solid var(--border);
    z-index: 11; transition: right 0.2s ease; padding: 22px;
    overflow-y: auto;
  }
  .drawer.open { right: 0; }
  .drawer h3 { font-family: var(--mono); margin: 0 0 4px; font-size: 16px; }
  .drawer .sub { color: var(--text-muted); font-size: 12px; margin-bottom: 18px; font-family: var(--mono); }
  .drawer .msg-box {
    background: var(--panel-alt); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 13px; line-height: 1.5; margin-bottom: 18px; white-space: pre-wrap;
  }
  .drawer textarea { min-height: 90px; resize: vertical; }
  .drawer .close-x {
    position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-muted);
    font-family: var(--mono); font-size: 13px; background: none; border: none;
  }
  .drawer .close-x:hover { color: var(--text); }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag-chip {
    font-family: var(--mono); font-size: 11px; background: var(--panel-alt);
    border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px;
    color: var(--text-muted); display: flex; align-items: center; gap: 6px;
  }
  .tag-chip button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>INBOUND<small>SignalWire Lead Console</small></div>
  <div class="conn">
    <div class="signal-bars" id="signalBars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <span id="connLabel">not connected</span>
    <button class="btn small" id="disconnectBtn" style="display:none;">Disconnect</button>
    <button class="btn small primary" id="refreshBtn" style="display:none;">Refresh</button>
  </div>
</div>

<div id="app"></div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="close-x" id="drawerClose">✕ close</button>
  <div id="drawerContent"></div>
</div>

<script>
const state = {
  connected: false,
  messages: [],
  filterText: '',
  statusFilters: new Set(['new','contacted','qualified','dead']),
  activePhone: null,
  fromNumber: null,
  view: 'inbox',
  analytics: null
};

const app = document.getElementById('app');
const signalBars = document.getElementById('signalBars');
const connLabel = document.getElementById('connLabel');
const disconnectBtn = document.getElementById('disconnectBtn');
const refreshBtn = document.getElementById('refreshBtn');
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
const drawerContent = document.getElementById('drawerContent');
const drawerClose = document.getElementById('drawerClose');

function setConnected(isConnected, spaceName, fromNumber) {
  state.connected = isConnected;
  state.fromNumber = fromNumber || null;
  signalBars.classList.toggle('live', isConnected);
  connLabel.textContent = isConnected ? (spaceName || 'connected') : 'not connected';
  disconnectBtn.style.display = isConnected ? 'inline-block' : 'none';
  refreshBtn.style.display = isConnected ? 'inline-block' : 'none';
}

async function checkStatus() {
  const r = await fetch('/api/status');
  const j = await r.json();
  setConnected(j.connected, j.space, j.fromNumber);
  render();
}

function renderConnectGate(errorMsg) {
  app.innerHTML = `
    <div class="connect-gate">
      <h2>Connect to SignalWire</h2>
      <p>Enter your Space, Project ID, and Auth Token. These stay in server memory for this session only, never written to disk or sent anywhere but SignalWire's API.</p>
      <div class="field"><label>SPACE (e.g. cruz-associates-llc)</label><input type="text" id="inSpace" placeholder="yourspace" /></div>
      <div class="field"><label>PROJECT ID</label><input type="text" id="inProject" placeholder="00000000-0000-0000-0000-000000000000" /></div>
      <div class="field"><label>AUTH TOKEN</label><input type="password" id="inToken" placeholder="••••••••••••••••" /></div>
      <div class="field"><label>FROM NUMBER (optional, needed to send replies)</label><input type="text" id="inFrom" placeholder="+15555550123" /></div>
      <button class="btn primary" id="connectBtn">Connect</button>
      ${errorMsg ? `<div class="error-msg">${errorMsg}</div>` : ''}
    </div>
  `;
  document.getElementById('connectBtn').onclick = async () => {
    const space = document.getElementById('inSpace').value.trim();
    const projectId = document.getElementById('inProject').value.trim();
    const authToken = document.getElementById('inToken').value.trim();
    const fromNumber = document.getElementById('inFrom').value.trim();
    if (!space || !projectId || !authToken) {
      renderConnectGate('All three fields are required.');
      return;
    }
    const r = await fetch('/api/connect', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ space, projectId, authToken, fromNumber })
    });
    const j = await r.json();
    if (!r.ok) { renderConnectGate(j.error || 'Connection failed.'); return; }
    setConnected(true, j.space, j.fromNumber);
    loadMessages();
  };
}

function renderCrmShell() {
  app.innerHTML = `
    <div class="view-tabs">
      <button class="view-tab ${state.view === 'inbox' ? 'active' : ''}" id="tabInbox">Inbox</button>
      <button class="view-tab ${state.view === 'analytics' ? 'active' : ''}" id="tabAnalytics">Analytics</button>
    </div>
    <div class="layout" id="viewInbox" style="display:${state.view === 'inbox' ? 'grid' : 'none'};">
      <div class="sidebar">
        <h4>Filter by status</h4>
        <div class="status-filter" id="statusFilters"></div>
        <h4>Markets</h4>
        <div id="marketList" style="color:var(--text-dim); font-size:12px; font-family:var(--mono);">(derived from tags)</div>
      </div>
      <div class="main">
        <div class="toolbar">
          <input type="text" id="searchBox" placeholder="Search phone number or message text..." />
          <button class="btn primary small" id="newMsgBtn">+ New message</button>
        </div>
        <div class="table-wrap" id="tableWrap"><div class="loading">Loading inbound messages...</div></div>
      </div>
    </div>
    <div class="dash-wrap" id="viewAnalytics" style="display:${state.view === 'analytics' ? 'block' : 'none'};">
      <div class="loading">Loading analytics...</div>
    </div>
  `;

  document.getElementById('tabInbox').addEventListener('click', () => switchView('inbox'));
  document.getElementById('tabAnalytics').addEventListener('click', () => switchView('analytics'));

  const statusEl = document.getElementById('statusFilters');
  ['new','contacted','qualified','dead'].forEach(s => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-status="${s}" /> ${s}`;
    statusEl.appendChild(label);
  });
  statusEl.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      const s = cb.getAttribute('data-status');
      if (cb.checked) state.statusFilters.add(s); else state.statusFilters.delete(s);
      renderTable();
    });
  });

  document.getElementById('searchBox').addEventListener('input', (e) => {
    state.filterText = e.target.value.toLowerCase();
    renderTable();
  });

  document.getElementById('newMsgBtn').addEventListener('click', () => openComposeDrawer());
}

function badgeClass(status) { return `badge ${status}`; }

function fmtTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso || 'N/A';
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!wrap) return;

  const filtered = state.messages.filter(m => {
    if (!state.statusFilters.has(m.status)) return false;
    if (state.filterText) {
      const hay = `${m.from} ${m.body}`.toLowerCase();
      if (!hay.includes(state.filterText)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty">No inbound messages match the current filters.</div>`;
    return;
  }

  const rows = filtered.map(m => `
    <tr data-phone="${m.from}" data-sid="${m.sid}">
      <td class="time">${fmtTime(m.dateSent)}</td>
      <td class="from">${m.from || 'N/A'}</td>
      <td class="body"><div>${m.market ? `<span style="color:var(--text-dim); font-family:var(--mono); font-size:11px;">${m.market}: </span>` : ''}</div><div class="preview">${(m.body || '').replace(/</g,'&lt;')}</div></td>
      <td><span class="${badgeClass(m.status)}">${m.status}</span></td>
    </tr>
  `).join('');

  wrap.innerHTML = `
    <table>
      <thead><tr><th>Received</th><th>From</th><th>Message</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  wrap.querySelectorAll('tbody tr').forEach(tr => {
    tr.addEventListener('click', () => openDrawer(tr.getAttribute('data-phone')));
  });
}

async function loadMessages() {
  const wrap = document.getElementById('tableWrap');
  if (wrap) wrap.innerHTML = `<div class="loading">Pulling inbound log from SignalWire…</div>`;
  try {
    const r = await fetch('/api/messages');
    const j = await r.json();
    if (!r.ok) {
      if (wrap) wrap.innerHTML = `<div class="empty">${j.error || 'Failed to load messages.'}</div>`;
      return;
    }
    state.messages = j.messages;
    renderTable();
  } catch (e) {
    if (wrap) wrap.innerHTML = `<div class="empty">Network error reaching the server: ${e.message}</div>`;
  }
}

function switchView(view) {
  state.view = view;
  const inboxEl = document.getElementById('viewInbox');
  const analyticsEl = document.getElementById('viewAnalytics');
  const tabInbox = document.getElementById('tabInbox');
  const tabAnalytics = document.getElementById('tabAnalytics');
  if (!inboxEl || !analyticsEl) return;
  inboxEl.style.display = view === 'inbox' ? 'grid' : 'none';
  analyticsEl.style.display = view === 'analytics' ? 'block' : 'none';
  tabInbox.classList.toggle('active', view === 'inbox');
  tabAnalytics.classList.toggle('active', view === 'analytics');
  if (view === 'analytics') loadAnalytics();
}

async function loadAnalytics() {
  const wrap = document.getElementById('viewAnalytics');
  if (!wrap) return;
  wrap.innerHTML = `<div class="loading">Pulling reply data from SignalWire...</div>`;
  try {
    const r = await fetch('/api/analytics');
    const j = await r.json();
    if (!r.ok) {
      wrap.innerHTML = `<div class="empty">${j.error || 'Failed to load analytics.'}</div>`;
      return;
    }
    state.analytics = j;
    renderAnalytics(j);
  } catch (e) {
    wrap.innerHTML = `<div class="empty">Network error reaching the server: ${e.message}</div>`;
  }
}

function fmtDuration(seconds) {
  if (seconds === null || seconds === undefined) return 'N/A';
  if (seconds < 60) return `${Math.round(seconds)}s`;
  if (seconds < 3600) return `${Math.round(seconds / 60)}m`;
  if (seconds < 86400) return `${(seconds / 3600).toFixed(1)}h`;
  return `${(seconds / 86400).toFixed(1)}d`;
}

function fmtHour(h) {
  const period = h < 12 ? 'AM' : 'PM';
  let display = h % 12;
  if (display === 0) display = 12;
  return `${display}${period}`;
}

function renderHourlyChart(hourly, bestHour) {
  const w = 700, h = 200, padL = 30, padB = 24, padT = 10, padR = 10;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const maxRate = Math.max(10, ...hourly.map(d => d.rate));
  const barW = plotW / hourly.length;

  const bars = hourly.map((d, i) => {
    const barH = (d.rate / maxRate) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - barH;
    const isBest = bestHour && d.hour === bestHour.hour && d.inbound > 0;
    const color = isBest ? 'var(--amber)' : 'var(--accent)';
    const label = i % 3 === 0 ? `<text x="${x + barW / 2}" y="${h - 6}" font-size="9" text-anchor="middle">${fmtHour(d.hour)}</text>` : '';
    return `
      <rect class="bar-tip" x="${x + 1.5}" y="${y}" width="${Math.max(barW - 3, 1)}" height="${Math.max(barH, 0)}" fill="${color}" opacity="${d.inbound ? 1 : 0.25}" rx="2">
        <title>${fmtHour(d.hour)}: ${d.rate}% response rate (${d.responded}/${d.inbound} replied)</title>
      </rect>
      ${label}
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}

function renderBucketChart(buckets) {
  const w = 700, rowH = 30, gap = 10, padL = 120, padR = 60;
  const h = buckets.length * (rowH + gap);
  const max = Math.max(1, ...buckets.map(b => b.count));
  const plotW = w - padL - padR;

  const rows = buckets.map((b, i) => {
    const y = i * (rowH + gap);
    const barW = (b.count / max) * plotW;
    const color = b.label === 'No reply yet' ? 'var(--text-dim)' : 'var(--blue)';
    return `
      <text x="${padL - 10}" y="${y + rowH / 2 + 4}" font-size="11" text-anchor="end">${b.label}</text>
      <rect x="${padL}" y="${y}" width="${Math.max(barW, 1)}" height="${rowH}" fill="${color}" rx="4">
        <title>${b.label}: ${b.count}</title>
      </rect>
      <text x="${padL + barW + 8}" y="${y + rowH / 2 + 4}" font-size="11" fill="var(--text)">${b.count}</text>
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${rows}</svg>`;
}

function renderDailyChart(daily) {
  const w = 700, h = 200, padL = 30, padB = 24, padT = 10, padR = 10;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  if (daily.length === 0) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`;
  const max = Math.max(1, ...daily.map(d => Math.max(d.inbound, d.outbound)));
  const barW = plotW / daily.length;
  const step = Math.max(1, Math.ceil(daily.length / 10));

  const bars = daily.map((d, i) => {
    const x = padL + i * barW;
    const inH = (d.inbound / max) * plotH;
    const outH = (d.outbound / max) * plotH;
    const label = i % step === 0 ? `<text x="${x + barW / 2}" y="${h - 6}" font-size="9" text-anchor="middle">${d.date.slice(5)}</text>` : '';
    return `
      <rect x="${x + 1}" y="${padT + plotH - inH}" width="${Math.max(barW / 2 - 2, 1)}" height="${inH}" fill="var(--accent)" rx="1">
        <title>${d.date}: ${d.inbound} inbound</title>
      </rect>
      <rect x="${x + barW / 2 + 1}" y="${padT + plotH - outH}" width="${Math.max(barW / 2 - 2, 1)}" height="${outH}" fill="var(--blue)" rx="1">
        <title>${d.date}: ${d.outbound} replies sent</title>
      </rect>
      ${label}
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}

function renderAnalytics(a) {
  const wrap = document.getElementById('viewAnalytics');
  if (!wrap) return;

  if (!a.totalInbound) {
    wrap.innerHTML = `<div class="empty">No inbound messages yet to build analytics from.</div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">Total inbound</div>
        <div class="value">${a.totalInbound}</div>
        <div class="sub">${a.totalOutbound} replies sent</div>
      </div>
      <div class="kpi-card">
        <div class="label">Response rate</div>
        <div class="value accent">${a.responseRate}%</div>
        <div class="sub">${a.respondedCount} of ${a.totalInbound} leads replied to</div>
      </div>
      <div class="kpi-card">
        <div class="label">Avg response time</div>
        <div class="value">${fmtDuration(a.avgResponseSeconds)}</div>
        <div class="sub">median ${fmtDuration(a.medianResponseSeconds)}</div>
      </div>
      <div class="kpi-card">
        <div class="label">Best time to text</div>
        <div class="value accent">${a.bestHour ? fmtHour(a.bestHour.hour) : 'N/A'}</div>
        <div class="sub">${a.bestHour ? `${a.bestHour.rate}% response rate` : 'not enough data yet'}</div>
      </div>
    </div>
    <div class="chart-card">
      <h4>Response rate by hour of day</h4>
      <div class="chart-note">UTC hour. Amber bar marks the highest-converting hour.</div>
      ${renderHourlyChart(a.hourly, a.bestHour)}
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h4>Response time distribution</h4>
        <div class="chart-note">How long it took to get a reply out, across all inbound messages.</div>
        ${renderBucketChart(a.responseBuckets)}
      </div>
      <div class="chart-card">
        <h4>Daily volume</h4>
        <div class="chart-note">Inbound (green) vs replies sent (blue), last 30 days.</div>
        ${renderDailyChart(a.dailyVolume)}
      </div>
    </div>
  `;
}

async function openDrawer(phone) {
  state.activePhone = phone;
  const msgsForPhone = state.messages.filter(m => m.from === phone);
  const latest = msgsForPhone[0];
  const rec = await (await fetch(`/api/contacts/${encodeURIComponent(phone)}`)).json();

  drawerContent.innerHTML = `
    <h3>${phone}</h3>
    <div class="sub">${msgsForPhone.length} inbound message${msgsForPhone.length === 1 ? '' : 's'} on file</div>
    <div class="msg-box">${(latest.body || '').replace(/</g,'&lt;')}</div>
    <div class="field">
      <label>Status</label>
      <select id="statusSelect">
        ${['new','contacted','qualified','dead'].map(s => `<option value="${s}" ${rec.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Market / Source</label>
      <input type="text" id="marketInput" value="${rec.market || ''}" placeholder="e.g. Cape Coral FL, Ohio SMS blast" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="notesInput" placeholder="Deal notes, callback times, ARV, etc.">${rec.notes || ''}</textarea>
    </div>
    <button class="btn primary" id="saveContactBtn" style="width:100%;">Save</button>

    <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--border);">
      <div class="field">
        <label>Reply to ${phone}</label>
        <textarea id="replyBody" placeholder="Type a reply..."></textarea>
      </div>
      ${state.fromNumber ? '' : `
      <div class="field">
        <label>From number (none set globally, enter one to send)</label>
        <input type="text" id="replyFrom" placeholder="+15555550123" />
      </div>`}
      <button class="btn" id="sendReplyBtn" style="width:100%;">Send</button>
      <div id="sendStatus" style="font-family:var(--mono); font-size:12px; margin-top:8px;"></div>
    </div>
  `;

  document.getElementById('saveContactBtn').onclick = async () => {
    const status = document.getElementById('statusSelect').value;
    const market = document.getElementById('marketInput').value;
    const notes = document.getElementById('notesInput').value;
    await fetch(`/api/contacts/${encodeURIComponent(phone)}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status, market, notes })
    });
    state.messages.forEach(m => { if (m.from === phone) { m.status = status; m.market = market; m.notes = notes; } });
    renderTable();
    closeDrawer();
  };

  const sendBtn = document.getElementById('sendReplyBtn');
  if (sendBtn) {
    sendBtn.onclick = async () => {
      const body = document.getElementById('replyBody').value.trim();
      const fromEl = document.getElementById('replyFrom');
      const from = fromEl ? fromEl.value.trim() : state.fromNumber;
      const statusEl = document.getElementById('sendStatus');
      if (!body) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Type a message first.';
        return;
      }
      if (!from) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Enter a From number to send.';
        return;
      }
      sendBtn.disabled = true;
      statusEl.style.color = 'var(--text-muted)';
      statusEl.textContent = 'Sending...';
      const r = await fetch('/api/send', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ to: phone, body, from })
      });
      const j = await r.json();
      sendBtn.disabled = false;
      if (!r.ok) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = j.error || 'Send failed.';
        return;
      }
      statusEl.style.color = 'var(--accent)';
      statusEl.textContent = `Sent (${j.status || 'queued'}).`;
      document.getElementById('replyBody').value = '';
    };
  }

  overlay.classList.add('open');
  drawer.classList.add('open');
}

function openComposeDrawer() {
  drawerContent.innerHTML = `
    <h3>New message</h3>
    <div class="sub">${state.fromNumber ? `Sending from ${state.fromNumber}` : 'No From Number set globally, enter one below'}</div>
    <div class="field">
      <label>To</label>
      <input type="text" id="composeTo" placeholder="+15555550123" />
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="composeBody" placeholder="Type a message..."></textarea>
    </div>
    ${state.fromNumber ? '' : `
    <div class="field">
      <label>From number</label>
      <input type="text" id="composeFrom" placeholder="+15555550123" />
    </div>`}
    <button class="btn primary" id="composeSendBtn" style="width:100%;">Send</button>
    <div id="composeStatus" style="font-family:var(--mono); font-size:12px; margin-top:8px;"></div>
  `;

  const sendBtn = document.getElementById('composeSendBtn');
  if (sendBtn) {
    sendBtn.onclick = async () => {
      const to = document.getElementById('composeTo').value.trim();
      const body = document.getElementById('composeBody').value.trim();
      const fromEl = document.getElementById('composeFrom');
      const from = fromEl ? fromEl.value.trim() : state.fromNumber;
      const statusEl = document.getElementById('composeStatus');
      if (!to || !body) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Both To and Message are required.';
        return;
      }
      if (!from) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Enter a From number to send.';
        return;
      }
      sendBtn.disabled = true;
      statusEl.style.color = 'var(--text-muted)';
      statusEl.textContent = 'Sending...';
      const r = await fetch('/api/send', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ to, body, from })
      });
      const j = await r.json();
      sendBtn.disabled = false;
      if (!r.ok) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = j.error || 'Send failed.';
        return;
      }
      statusEl.style.color = 'var(--accent)';
      statusEl.textContent = `Sent (${j.status || 'queued'}).`;
      document.getElementById('composeBody').value = '';
    };
  }

  overlay.classList.add('open');
  drawer.classList.add('open');
}

function closeDrawer() {
  overlay.classList.remove('open');
  drawer.classList.remove('open');
}
overlay.addEventListener('click', closeDrawer);
drawerClose.addEventListener('click', closeDrawer);

disconnectBtn.addEventListener('click', async () => {
  await fetch('/api/disconnect', { method: 'POST' });
  setConnected(false);
  render();
});
refreshBtn.addEventListener('click', () => {
  if (state.view === 'analytics') loadAnalytics(); else loadMessages();
});

function render() {
  if (!state.connected) {
    renderConnectGate();
  } else {
    renderCrmShell();
    loadMessages();
  }
}

checkStatus();
</script>

</body>
</html>
