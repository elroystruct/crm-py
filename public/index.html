<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zócalo Capital CRM</title>
<meta name="description" content="Zócalo Capital CRM tracks leads, SMS campaigns, and deal pipeline in one place, from first inbound text to closed contract." />
<link rel="icon" type="image/png" href="/assets/logo-black-crop.png" />
<link rel="apple-touch-icon" href="/assets/logo-black-crop.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:        #7C6FE8;
    --purple-deep:    #6C5DD3;
    --purple-wash:    #C9C2F0;
    --lavender-hover: #F1EFFC;
    --lavender-tint:  #EFECFB;

    --bg: #C9C2F0;
    --panel: #FFFFFF;
    --panel-alt: #FAFAFF;
    --border: rgba(20,18,40,0.08);
    --text: #1A1A1A;
    --text-muted: #6B6B75;
    --text-dim: #9B99A6;
    --accent: #7C6FE8;
    --accent-dim: #EFECFB;
    --amber: #F2994A;
    --red: #EF6E6E;
    --blue: #5B9EF3;
    --green: #34C77B;
    --mono: 'Inter', sans-serif;
    --sans: 'Inter', sans-serif;
    --display: 'Plus Jakarta Sans', 'Inter', sans-serif;

    --r-outer: 22px;
    --r-card: 14px;
    --r-sm: 10px;
    --r-pill: 999px;
    --shadow-panel: 0 20px 48px -20px rgba(46, 38, 92, 0.28);
    --shadow-card: 0 8px 24px -12px rgba(46, 38, 92, 0.18);
    --shadow-float: 0 2px 10px -4px rgba(46, 38, 92, 0.14);
    --ease: cubic-bezier(.22,.9,.36,1);
  }

  html[data-theme="light"] {
    --bg: #C9C2F0;
    --panel: #FFFFFF;
    --panel-alt: #FAFAFF;
    --border: rgba(20,18,40,0.08);
    --text: #1A1A1A;
    --text-muted: #6B6B75;
    --text-dim: #9B99A6;
    --accent: #7C6FE8;
    --accent-dim: #EFECFB;
    --amber: #C6791F;
    --red: #D34747;
    --blue: #3E7FD6;
  }

  /* dark mode kept subtle/optional, still on-brand */
  html:not([data-theme="light"]) {
    --bg: #16141F;
    --panel: #1E1C29;
    --panel-alt: #262233;
    --border: rgba(255,255,255,0.08);
    --text: #F3F2FA;
    --text-muted: #A9A6BC;
    --text-dim: #6E6B82;
    --accent: #9C90F5;
    --accent-dim: #2A2540;
  }

  html[data-theme="light"] .badge.new { background: rgba(242,153,74,0.14); }
  html[data-theme="light"] .badge.contacted { background: rgba(91,158,243,0.12); }
  html[data-theme="light"] .badge.qualified,
  html[data-theme="light"] .badge.healthy { background: rgba(52,199,123,0.12); }
  html[data-theme="light"] .badge.contract { background: rgba(124,111,232,0.14); color: #6C5DD3; border-color: transparent; }
  html[data-theme="light"] .badge.dead,
  html[data-theme="light"] .badge.fatigued { background: rgba(239,110,110,0.12); }
  html[data-theme="light"] .kpi-card .value.accent { color: var(--purple-deep); }

  body, .btn, input, select, textarea, .badge, .tier-tab {
    transition: background-color 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease), transform .15s var(--ease), box-shadow .2s var(--ease);
  }

  .theme-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 10px;
    border: none; background: var(--lavender-hover); color: var(--text-muted);
    cursor: pointer; font-size: 14px; line-height: 1;
  }
  .theme-toggle:hover { background: var(--purple); color: #fff; }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 85% -5%, rgba(255,255,255,0.35), transparent 45%),
      repeating-radial-gradient(circle at 15% 20%, rgba(255,255,255,0.10) 0, rgba(255,255,255,0.10) 1px, transparent 1px, transparent 60px);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  html:not([data-theme="light"]) body{ background-image:none; }

  h1,h2,h3,h4 { font-family: var(--display); letter-spacing: -0.01em; }
  ::selection { background: var(--purple); color: #fff; }
  ::-webkit-scrollbar{ width:7px; height:7px; }
  ::-webkit-scrollbar-thumb{ background: var(--purple-wash); border-radius: 10px; }
  ::-webkit-scrollbar-track{ background: transparent; }

  #app {
    height: calc(100vh - 76px - 56px);
    overflow: hidden;
    margin: 0 14px;
  }

  /* ---------- top bar ---------- */
  .topbar {
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    margin: 14px 14px 8px;
    border-bottom: none;
    background: var(--panel);
    border-radius: var(--r-outer);
    box-shadow: var(--shadow-panel);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.01em;
  }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(155deg, var(--purple), var(--purple-deep)); box-shadow: 0 0 0 4px var(--lavender-hover); }
  .brand .brand-mark { width: 24px; height: 24px; object-fit: contain; }
  .brand small { color: var(--text-muted); font-weight: 600; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; margin-left: 6px; }

  .conn {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-muted);
  }

  .signal-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 16px;
  }
  .signal-bars .bar {
    width: 4px;
    background: var(--text-dim);
    border-radius: 2px;
    transition: background 0.2s;
  }
  .signal-bars .bar:nth-child(1) { height: 5px; }
  .signal-bars .bar:nth-child(2) { height: 9px; }
  .signal-bars .bar:nth-child(3) { height: 13px; }
  .signal-bars .bar:nth-child(4) { height: 16px; }
  .signal-bars.live .bar { background: var(--green); animation: pulse 1.6s ease-in-out infinite; }
  .signal-bars.live .bar:nth-child(1) { animation-delay: 0s; }
  .signal-bars.live .bar:nth-child(2) { animation-delay: 0.15s; }
  .signal-bars.live .bar:nth-child(3) { animation-delay: 0.3s; }
  .signal-bars.live .bar:nth-child(4) { animation-delay: 0.45s; }
  @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    background: var(--lavender-hover);
    border: none;
    color: var(--text);
    padding: 9px 16px;
    border-radius: var(--r-card);
    cursor: pointer;
  }
  .btn:hover { background: var(--purple-wash); }
  .btn:active { transform: scale(.96); }
  .btn.primary { background: linear-gradient(155deg, var(--purple), var(--purple-deep)); color: #fff; box-shadow: 0 10px 22px -8px rgba(124,111,232,0.55); }
  .btn.primary:hover { box-shadow: 0 12px 26px -6px rgba(124,111,232,0.65); opacity: 1; }
  .btn.small { padding: 7px 12px; font-size: 12px; border-radius: 10px; }

  /* ---------- layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 250px 1fr;
    height: 100%;
    gap: 14px;
  }

  .sidebar {
    border-right: none;
    background: var(--panel);
    border-radius: var(--r-outer);
    box-shadow: var(--shadow-panel);
    padding: 20px 18px;
    overflow-y: auto;
  }

  .sidebar h4 {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin: 20px 0 12px;
  }
  .sidebar h4:first-child { margin-top: 0; }

  input[type="text"], input[type="password"], select, textarea {
    width: 100%;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: var(--r-sm);
    font-family: var(--sans);
    font-size: 13.5px;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,111,232,0.16); }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 7px;
    font-family: var(--sans);
  }

  .status-filter { display: flex; flex-direction: column; gap: 4px; }
  .status-filter label {
    display: flex; align-items: center; gap: 9px;
    font-size: 13px; cursor: pointer; color: var(--text-muted);
    padding: 7px 8px; border-radius: 9px; text-transform: capitalize;
  }
  .status-filter label:hover { background: var(--lavender-hover); color: var(--text); }
  .status-filter input { width: auto; accent-color: var(--purple); }

  .count-pill {
    margin-left: auto;
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 700;
    background: var(--lavender-hover);
    border: none;
    border-radius: 999px;
    padding: 2px 8px;
    color: var(--purple-deep);
  }

  /* ---------- main ---------- */
  .main { display: flex; flex-direction: column; overflow: hidden; background: var(--panel); border-radius: var(--r-outer); box-shadow: var(--shadow-panel); }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar input[type="text"] {
    flex: 1;
    background: var(--lavender-hover);
    border: none;
    border-radius: var(--r-pill);
    padding: 11px 16px;
  }
  .toolbar input[type="text"]:focus { box-shadow: 0 0 0 3px rgba(124,111,232,0.18); }

  .table-wrap { flex: 1; overflow-y: auto; padding: 8px 14px 14px; }

  table { width: 100%; border-collapse: separate; border-spacing: 0 2px; font-size: 13.5px; }
  thead th {
    position: sticky; top: 0;
    background: var(--panel);
    text-align: left;
    padding: 10px 14px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }
  tbody tr {
    border-bottom: none;
    cursor: pointer;
    transition: background 0.2s var(--ease);
    border-radius: var(--r-card);
  }
  tbody tr:hover td { background: var(--lavender-hover); }
  tbody td { padding: 13px 14px; vertical-align: top; }
  tbody td:first-child { border-radius: var(--r-card) 0 0 var(--r-card); }
  tbody td:last-child { border-radius: 0 var(--r-card) var(--r-card) 0; }
  td.time { font-family: var(--sans); color: var(--text-muted); white-space: nowrap; font-size: 12px; }
  td.from { font-family: var(--sans); font-weight: 600; white-space: nowrap; }
  td.body { color: var(--text); max-width: 420px; }
  td.body .preview {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; color: var(--text-muted);
  }

  .badge {
    font-family: var(--sans);
    font-size: 10.5px;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: 0.02em;
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-block;
    white-space: nowrap;
    border: none;
  }
  .badge.new { background: rgba(242,153,74,0.14); color: var(--amber); }
  .badge.contacted { background: rgba(91,158,243,0.14); color: var(--blue); }
  .badge.qualified { background: rgba(52,199,123,0.14); color: #1F9A5C; }
  .badge.contract { background: rgba(124,111,232,0.16); color: #6C5DD3; }
  .badge.dead { background: rgba(239,110,110,0.14); color: var(--red); }
  .badge.fatigued { background: rgba(239,110,110,0.14); color: var(--red); }
  .badge.healthy { background: rgba(52,199,123,0.14); color: #1F9A5C; }

  /* ---------- dashboard tiers ---------- */
  .tier-tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--lavender-hover); padding: 4px; border-radius: 12px; width: fit-content; }
  .tier-tab {
    font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    background: transparent; border: none; color: var(--text-muted);
    padding: 8px 16px; border-radius: 9px; cursor: pointer;
  }
  .tier-tab:hover { color: var(--text); }
  .tier-tab.active { color: var(--text); background: var(--panel); box-shadow: var(--shadow-float); font-weight: 700; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 4px; }
  .data-table th { text-align: left; padding: 10px 12px; font-family: var(--sans); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .data-table td { padding: 12px; border-bottom: 1px solid var(--border); font-family: var(--sans); font-size: 13px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tbody tr:hover td { background: var(--lavender-hover); }

  /* ---------- campaign manager ---------- */
  .campaign-item {
    background: var(--panel-alt); border: 1px solid var(--border); border-radius: var(--r-card);
    padding: 14px 16px; margin-bottom: 10px; font-size: 12.5px;
  }
  .campaign-item .cname { font-weight: 700; font-size: 13.5px; font-family: var(--display); }
  .campaign-item .cmeta { color: var(--text-dim); font-family: var(--sans); font-size: 11.5px; margin-top: 4px; }
  .campaign-item .ccost-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .campaign-item input[type="text"], .campaign-item input[type="number"] { padding: 6px 9px; font-size: 12px; }

  .empty, .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 13.5px;
  }

  /* ---------- view tabs ---------- */
  .view-tabs {
    display: flex;
    gap: 6px;
    padding: 16px 22px 16px;
    border-bottom: none;
    background: transparent;
  }
  .view-tab {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    background: var(--lavender-hover);
    border: none;
    color: var(--text-muted);
    padding: 10px 18px;
    border-radius: var(--r-pill);
    cursor: pointer;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    color: #fff;
    background: linear-gradient(155deg, var(--purple), var(--purple-deep));
    box-shadow: 0 8px 18px -6px rgba(124,111,232,0.5);
  }

  /* ---------- analytics dashboard ---------- */
  .dash-wrap { height: 100%; overflow-y: auto; padding: 6px 22px 26px; box-sizing: border-box; background: var(--panel); border-radius: var(--r-outer); box-shadow: var(--shadow-panel); }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 18px;
    box-shadow: var(--shadow-card);
    transition: transform .25s var(--ease);
  }
  .kpi-card:hover{ transform: translateY(-3px); }
  .kpi-card .label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .kpi-card .value {
    font-family: var(--display);
    font-size: 27px;
    font-weight: 800;
    color: var(--text);
  }
  .kpi-card .value.accent { color: var(--purple-deep); }
  .kpi-card .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 8px; font-family: var(--sans); }

  /* ---------- footer ---------- */
  .footer-bar {
    height: 56px;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 22px; gap: 12px;
    margin: 8px 14px 14px;
    border-top: none;
    background: var(--panel);
    border-radius: var(--r-outer);
    box-shadow: var(--shadow-panel);
    font-family: var(--sans); font-size: 12.5px; color: var(--text-muted);
  }
  .footer-bar .btn.small { padding: 8px 14px; }
  #optOutCount { color: var(--red); font-weight: 700; }

  /* ---------- account card ---------- */
  .account-card { position: relative; margin-left: 4px; }
  .account-trigger {
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    padding: 5px 12px 5px 5px; border-radius: 999px; border: none;
  }
  .account-trigger:hover { background: var(--lavender-hover); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; flex: 0 0 auto;
    background: linear-gradient(155deg, var(--purple), var(--purple-deep)); color: #fff; font-family: var(--display); font-weight: 700;
    font-size: 11.5px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; text-transform: uppercase;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .account-text { line-height: 1.25; text-align: left; }
  .account-greeting { font-size: 9.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--sans); font-weight: 600; }
  .account-name { font-size: 12.5px; color: var(--text); font-weight: 700; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .account-menu {
    display: none; position: absolute; top: 46px; right: 0; min-width: 200px;
    background: var(--panel); border: 1px solid var(--border-soft, var(--border)); border-radius: var(--r-card);
    box-shadow: var(--shadow-panel); z-index: 20; overflow: hidden; padding: 6px;
  }
  .account-menu.open { display: block; }
  .account-menu-item {
    padding: 10px 12px; font-size: 13px; color: var(--text); cursor: pointer;
    border-bottom: none; font-family: var(--sans); border-radius: 9px;
  }
  .account-menu-item:hover { background: var(--lavender-hover); }
  .account-menu-item.danger { color: var(--red); }

  /* ---------- auth (login / signup) ---------- */
  .auth-shell {
    height: 100%; display: flex; align-items: center; justify-content: center;
    background: transparent;
    padding: 20px;
  }
  .auth-card {
    width: 100%; max-width: 920px; min-height: 560px;
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--panel); border: none;
    border-radius: 26px; overflow: hidden;
    box-shadow: var(--shadow-panel);
  }
  .auth-card .auth-form-col { padding: 52px 56px; display: flex; flex-direction: column; justify-content: center; }
  .auth-brand { text-align: left; margin-bottom: 34px; display: flex; align-items: center; gap: 10px; }
  .auth-brand .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(155deg, var(--purple), var(--purple-deep)); margin-right: 0; }
  .auth-brand .name { font-family: var(--display); font-weight: 800; letter-spacing: 0.01em; font-size: 16px; color: var(--text); }
  .auth-brand .sub { font-family: var(--sans); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
  .auth-tabs {
    display: inline-flex; background: var(--lavender-hover); border-radius: 999px;
    padding: 4px; width: fit-content; margin-bottom: 28px; border: none; overflow: visible;
  }
  .auth-tab {
    flex: none; text-align: center; padding: 9px 22px; font-family: var(--sans); font-size: 13px; font-weight: 600;
    color: var(--text-muted); cursor: pointer; background: transparent; border-radius: 999px;
  }
  .auth-tab.active { background: linear-gradient(155deg, var(--purple), var(--purple-deep)); color: #fff; font-weight: 700; box-shadow: 0 8px 18px -6px rgba(124,111,232,0.55); }
  .auth-card .field { margin-bottom: 16px; }
  .auth-card .btn.primary { width: 100%; padding: 13px; margin-top: 8px; font-size: 14px; border-radius: var(--r-card); }
  .auth-hint { color: var(--text-dim); font-size: 11.5px; margin: -6px 0 14px; font-family: var(--sans); line-height: 1.5; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .chart-card {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-card h4 {
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 4px;
  }

<body>

<div class="topbar" id="topbarEl">
  <div class="brand"><img src="/assets/logo-black-crop.png" alt="" class="brand-mark" />ZÓCALO CAPITAL<small>CRM</small></div>
  <div class="conn">
    <div class="signal-bars" id="signalBars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    <span id="connLabel">not connected</span>
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">◐</button>
    <button class="btn small" id="disconnectBtn" style="display:none;">Disconnect</button>
    <button class="btn small primary" id="refreshBtn" style="display:none;">Refresh</button>
    <div class="account-card" id="accountCard" style="display:none;">
      <div class="account-trigger" id="accountTrigger">
        <div class="avatar" id="accountAvatar"></div>
        <div class="account-text">
          <div class="account-greeting">Welcome</div>
          <div class="account-name" id="accountName"></div>
        </div>
      </div>
      <div class="account-menu" id="accountMenu">
        <div class="account-menu-header">
          <div class="avatar" id="accountMenuAvatar"></div>
          <div class="who">
            <div class="who-name" id="accountMenuName"></div>
            <div class="who-email" id="accountMenuEmail"></div>
          </div>
        </div>
        <label class="account-menu-item" for="avatarFileInput">Change profile picture</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" />
        <div class="account-menu-item" id="removeAvatarItem">Remove profile picture</div>
        <div class="account-menu-item" id="logoutItem">Log out</div>
        <div class="account-menu-item danger" id="deleteAccountItem">Delete account</div>
      </div>
    </div>
  </div>
</div>

<div id="app"></div>

<div class="footer-bar" id="footerBarEl">
  <span id="optOutStatus"></span>
  <button class="btn small" id="optOutsBtn">Opt-outs (<span id="optOutCount">0</span>)</button>
</div>


<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <button class="close-x" id="drawerClose">✕ close</button>
  <div id="drawerContent"></div>
</div>

<script>
const STATUSES = ['new','contacted','qualified','contract','dead'];

const state = {
  user: null,
  connected: false,
  messages: [],
  filterText: '',
  statusFilters: new Set(STATUSES),
  activePhone: null,
  fromNumber: null,
  view: 'inbox',
  analytics: null,
  campaigns: [],
  dashboard: null,
  kpiPeriod: 'allTime',
  dashboardTier: 'kpis'
};

async function loadCampaigns() {
  try {
    const r = await fetch('/api/campaigns');
    const j = await r.json();
    if (r.ok) state.campaigns = j.campaigns;
  } catch (e) { /* non-fatal, campaign UI just shows empty */ }
}

function campaignName(id) {
  const c = state.campaigns.find(c => String(c.id) === String(id));
  return c ? c.name : null;
}

const app = document.getElementById('app');
const signalBars = document.getElementById('signalBars');
const connLabel = document.getElementById('connLabel');
const disconnectBtn = document.getElementById('disconnectBtn');
const refreshBtn = document.getElementById('refreshBtn');
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
const drawerContent = document.getElementById('drawerContent');
const drawerClose = document.getElementById('drawerClose');

// ---------- theme ----------
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'light' ? '◑' : '◐';
}
(function initTheme() {
  let saved = 'dark';
  try { saved = localStorage.getItem('theme') || 'dark'; } catch (e) { /* storage unavailable, default to dark */ }
  applyTheme(saved);
})();
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem('theme', next); } catch (e) { /* non-fatal */ }
});

function setConnected(isConnected, spaceName, fromNumber) {
  state.connected = isConnected;
  state.fromNumber = fromNumber || null;
  signalBars.classList.toggle('live', isConnected);
  connLabel.textContent = isConnected ? (spaceName || 'connected') : 'not connected';
  disconnectBtn.style.display = isConnected ? 'inline-block' : 'none';
  refreshBtn.style.display = isConnected ? 'inline-block' : 'none';
}

async function checkStatus() {
  const r = await fetch('/api/status');
  const j = await r.json();
  setConnected(j.connected, j.space, j.fromNumber);
  render();
}

// ---------- auth (login / signup) ----------
const topbarEl = document.getElementById('topbarEl');
const footerBarEl = document.getElementById('footerBarEl');
const accountCard = document.getElementById('accountCard');
const accountAvatar = document.getElementById('accountAvatar');
const accountName = document.getElementById('accountName');
const accountTrigger = document.getElementById('accountTrigger');
const accountMenu = document.getElementById('accountMenu');

function initials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '?';
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

function renderAvatar(el, user) {
  el.innerHTML = user && user.avatar
    ? `<img src="${user.avatar}" alt="" />`
    : `<img src="/assets/default-avatar.png" alt="" />`;
}

function renderAccountCard() {
  if (!state.user) { accountCard.style.display = 'none'; return; }
  accountCard.style.display = 'block';
  renderAvatar(accountAvatar, state.user);
  accountName.textContent = (state.user.name || '').split(' ')[0] || state.user.email;
  const menuAvatar = document.getElementById('accountMenuAvatar');
  const menuName = document.getElementById('accountMenuName');
  const menuEmail = document.getElementById('accountMenuEmail');
  if (menuAvatar) renderAvatar(menuAvatar, state.user);
  if (menuName) menuName.textContent = state.user.name || 'Account';
  if (menuEmail) menuEmail.textContent = state.user.email || '';
}

accountTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  accountMenu.classList.toggle('open');
});
document.addEventListener('click', () => accountMenu.classList.remove('open'));

document.getElementById('avatarFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) {
    alert('Please choose an image under 500KB.');
    e.target.value = '';
    return;
  }
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const r = await fetch('/api/auth/profile', {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ avatar: dataUrl })
  });
  const j = await r.json();
  if (r.ok) { state.user = j.user; renderAccountCard(); }
  accountMenu.classList.remove('open');
  e.target.value = '';
});

document.getElementById('removeAvatarItem').addEventListener('click', async () => {
  const r = await fetch('/api/auth/profile', {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ avatar: null })
  });
  const j = await r.json();
  if (r.ok) { state.user = j.user; renderAccountCard(); }
  accountMenu.classList.remove('open');
});

document.getElementById('logoutItem').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  state.user = null;
  accountMenu.classList.remove('open');
  await fetch('/api/disconnect', { method: 'POST' });
  init();

function badgeClass(status) { return `badge ${status}`; }

function fmtTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return iso || 'N/A';
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function initialsFor(m) {
  const src = (m.name || m.from || '?').trim();
  const parts = src.replace(/[^a-zA-Z0-9 ]/g, ' ').trim().split(/\s+/);
  if (!parts.length || !parts[0]) return '?';
  return parts.slice(0, 2).map(p => p[0]).join('').toUpperCase();
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!wrap) return;

  const filtered = state.messages.filter(m => {
    if (!state.statusFilters.has(m.status)) return false;
    if (state.filterText) {
      const hay = `${m.from} ${m.name || ''} ${m.body}`.toLowerCase();
      if (!hay.includes(state.filterText)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty">No inbound messages match the current filters.</div>`;
    return;
  }

  const rows = filtered.map(m => `
    <div class="msg-row" data-phone="${m.from}" data-sid="${m.sid}">
      <div class="row-avatar">${initialsFor(m)}</div>
      <div class="row-body">
        <div class="row-top">
          <span class="row-name">${m.name || m.from || 'N/A'}</span>
          <span class="row-time">${fmtTime(m.dateSent)}</span>
        </div>
        <div class="row-preview">${m.market ? `<span style="color:var(--text-dim);">${m.market}: </span>` : ''}${(m.body || '').replace(/</g,'&lt;')}</div>
      </div>
      <span class="${badgeClass(m.status)}">${m.status}</span>
    </div>
  `).join('');

  wrap.innerHTML = `<div class="row-list">${rows}</div>`;

  wrap.querySelectorAll('.msg-row').forEach(row => {
    row.addEventListener('click', () => openDrawer(row.getAttribute('data-phone')));
  });
}

async function loadMessages() {
  const wrap = document.getElementById('tableWrap');
  if (wrap) wrap.innerHTML = `<div class="loading">Pulling inbound log from SignalWire…</div>`;
  try {
    const r = await fetch('/api/messages');
    const j = await r.json();
    if (!r.ok) {
      if (wrap) wrap.innerHTML = `<div class="empty">${j.error || 'Failed to load messages.'}</div>`;
      return;
    }
    state.messages = j.messages;
    renderTable();
  } catch (e) {
    if (wrap) wrap.innerHTML = `<div class="empty">Network error reaching the server: ${e.message}</div>`;
  }
}

function switchView(view) {
  state.view = view;
  const views = { inbox: 'viewInbox', dashboard: 'viewDashboard', campaigns: 'viewCampaigns' };
  const tabs = { inbox: 'tabInbox', dashboard: 'tabDashboard', campaigns: 'tabCampaigns' };
  Object.entries(views).forEach(([v, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = v === view ? (v === 'inbox' ? 'grid' : 'block') : 'none';
  });
  Object.entries(tabs).forEach(([v, id]) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', v === view);
  });
  if (view === 'dashboard') loadDashboard();
  if (view === 'campaigns') renderCampaignsView();
}

function fmtHours(h) {
  if (h === null || h === undefined) return 'N/A';
  if (h < 1) return `${Math.round(h * 60)}m`;
  if (h < 48) return `${h.toFixed(1)}h`;
  return `${(h / 24).toFixed(1)}d`;
}

function fmtMoney(n) {
  if (n === null || n === undefined) return 'N/A';
  return `$${Number(n).toLocaleString(undefined, {maximumFractionDigits: 2})}`;
}

function drawDashLineChart(data, labels) {
  const w = 620, h = 210, pad = 10;
  const max = Math.max(...data, 1), min = Math.min(...data, 0);
  const stepX = (w - pad*2) / Math.max(data.length - 1, 1);
  const pts = data.map((v,i) => {
    const x = pad + i*stepX;
    const y = h - pad - ((v - min) / ((max - min) || 1)) * (h - pad*2);
    return [x,y];
  });
  const line = pts.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = pts.length ? line + ` L${pts[pts.length-1][0]} ${h} L${pts[0][0]} ${h} Z` : '';
  const dots = pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#7C6FE8" stroke="white" stroke-width="2"/>`).join('');
  let grid = '';
  for (let i=0;i<=4;i++){ const y = pad + i*(h-pad*2)/4; grid += `<line x1="0" y1="${y}" x2="${w}" y2="${y}"/>`; }
  return `
    <svg class="dash-chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="heroAreaFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7C6FE8" stop-opacity="0.28"/><stop offset="100%" stop-color="#7C6FE8" stop-opacity="0"/>
      </linearGradient></defs>
      <g stroke="currentColor" stroke-opacity="0.08">${grid}</g>
      <path d="${area}" fill="url(#heroAreaFill)" stroke="none"></path>
      <path d="${line}" fill="none" stroke="#7C6FE8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
      <g>${dots}</g>
    </svg>
    <div class="flex justify-between mt-8" style="padding:0 4px;">
      ${labels.map(l => `<span class="text-meta" style="font-size:11px;color:var(--text-dim);">${l}</span>`).join('')}
    </div>
  `;
}

function fmtDuration(seconds) {
  if (seconds === null || seconds === undefined) return 'N/A';
  if (seconds < 60) return `${Math.round(seconds)}s`;
  if (seconds < 3600) return `${Math.round(seconds / 60)}m`;
  if (seconds < 86400) return `${(seconds / 3600).toFixed(1)}h`;
  return `${(seconds / 86400).toFixed(1)}d`;
}

function fmtHour(h) {
  const period = h < 12 ? 'AM' : 'PM';
  let display = h % 12;
  if (display === 0) display = 12;
  return `${display}${period}`;
}

function renderHourlyChart(hourly, bestHour) {
  const w = 700, h = 200, padL = 30, padB = 24, padT = 10, padR = 10;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const maxRate = Math.max(10, ...hourly.map(d => d.rate));
  const barW = plotW / hourly.length;

  const bars = hourly.map((d, i) => {
    const barH = (d.rate / maxRate) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - barH;
    const isBest = bestHour && d.hour === bestHour.hour && d.inbound > 0;
    const color = isBest ? 'var(--amber)' : 'var(--accent)';
    const label = i % 3 === 0 ? `<text x="${x + barW / 2}" y="${h - 6}" font-size="9" text-anchor="middle">${fmtHour(d.hour)}</text>` : '';
    return `
      <rect class="bar-tip" x="${x + 1.5}" y="${y}" width="${Math.max(barW - 3, 1)}" height="${Math.max(barH, 0)}" fill="${color}" opacity="${d.inbound ? 1 : 0.25}" rx="2">
        <title>${fmtHour(d.hour)}: ${d.rate}% response rate (${d.responded}/${d.inbound} replied)</title>
      </rect>
      ${label}
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}

function renderBucketChart(buckets) {
  const w = 700, rowH = 30, gap = 10, padL = 120, padR = 60;
  const h = buckets.length * (rowH + gap);
  const max = Math.max(1, ...buckets.map(b => b.count));
  const plotW = w - padL - padR;

  const rows = buckets.map((b, i) => {
    const y = i * (rowH + gap);
    const barW = (b.count / max) * plotW;
    const color = b.label === 'No reply yet' ? 'var(--text-dim)' : 'var(--blue)';
    return `
      <text x="${padL - 10}" y="${y + rowH / 2 + 4}" font-size="11" text-anchor="end">${b.label}</text>
      <rect x="${padL}" y="${y}" width="${Math.max(barW, 1)}" height="${rowH}" fill="${color}" rx="4">
        <title>${b.label}: ${b.count}</title>
      </rect>
      <text x="${padL + barW + 8}" y="${y + rowH / 2 + 4}" font-size="11" fill="var(--text)">${b.count}</text>
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${rows}</svg>`;
}

function renderDailyChart(daily) {
  const w = 700, h = 200, padL = 30, padB = 24, padT = 10, padR = 10;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  if (daily.length === 0) return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}"></svg>`;
  const max = Math.max(1, ...daily.map(d => Math.max(d.inbound, d.outbound)));
  const barW = plotW / daily.length;
  const step = Math.max(1, Math.ceil(daily.length / 10));

  const bars = daily.map((d, i) => {
    const x = padL + i * barW;
    const inH = (d.inbound / max) * plotH;
    const outH = (d.outbound / max) * plotH;
    const label = i % step === 0 ? `<text x="${x + barW / 2}" y="${h - 6}" font-size="9" text-anchor="middle">${d.date.slice(5)}</text>` : '';
    return `
      <rect x="${x + 1}" y="${padT + plotH - inH}" width="${Math.max(barW / 2 - 2, 1)}" height="${inH}" fill="var(--accent)" rx="1">
        <title>${d.date}: ${d.inbound} inbound</title>
      </rect>
      <rect x="${x + barW / 2 + 1}" y="${padT + plotH - outH}" width="${Math.max(barW / 2 - 2, 1)}" height="${outH}" fill="var(--blue)" rx="1">
        <title>${d.date}: ${d.outbound} replies sent</title>
      </rect>
      ${label}
    `;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">${bars}</svg>`;
}

function fmtChatTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}
function fmtChatDay(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return 'Today';
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
}

function renderChatThread(thread) {
  if (!thread.length) {
    return `<div class="lead-chat-empty">No messages on file yet.</div>`;
  }
  let html = '';
  let lastDay = null;
  thread.forEach(m => {
    const day = fmtChatDay(m.dateSent);
    if (day !== lastDay) {
      html += `<div class="chat-day-sep">${day}</div>`;
      lastDay = day;
    }
    const isOut = m.direction === 'outbound';
    const failed = ['failed', 'undelivered'].includes(m.status);
    html += `
      <div class="chat-row ${isOut ? 'out' : 'in'}">
        <div>
          <div class="chat-bubble">${(m.body || '').replace(/</g,'&lt;')}</div>
          <div class="chat-meta">
            <span>${fmtChatTime(m.dateSent)}</span>
            ${isOut ? `<span class="${failed ? 'fail' : ''}">${failed ? (m.errorCode ? `failed (${m.errorCode})` : 'failed') : (m.status || 'sent')}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  });
  return html;
}

async function openDrawer(phone) {
  state.activePhone = phone;
  drawer.classList.add('wide');

  const msgsForPhone = state.messages.filter(m => m.from === phone);
  const leadName = msgsForPhone.find(m => m.name)?.name || '';

  drawerContent.innerHTML = `
    <div class="lead-view">
      <div class="lead-chat-col">
        <div class="lead-chat-header">
          <div>
            <h3>${leadName ? `${leadName} <span style="color:var(--text-muted); font-weight:400;">· ${phone}</span>` : phone}</h3>
            <div class="sub">${msgsForPhone.length} inbound message${msgsForPhone.length === 1 ? '' : 's'} on file</div>
          </div>
        </div>
        <div class="lead-chat-thread" id="chatThread">
          <div class="lead-chat-empty">Loading conversation…</div>
        </div>
        <div class="lead-chat-composer">
          ${state.fromNumber ? '' : `
          <div class="field" style="margin-bottom:8px;">
            <input type="text" id="replyFrom" placeholder="From number, e.g. +15555550123" />
          </div>`}
          <div class="row">
            <textarea id="replyBody" placeholder="Message ${leadName || phone}..."></textarea>
            <button class="btn primary" id="sendReplyBtn" title="Send"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
          <div id="sendStatus" style="font-size:11px; margin-top:6px;"></div>
        </div>
      </div>
      <div class="lead-detail-col" id="leadDetailCol"></div>
    </div>
  `;

  overlay.classList.add('open');
  drawer.classList.add('open');

  loadLeadDetail(phone);
  loadConversation(phone);

  const sendBtn = document.getElementById('sendReplyBtn');
  sendBtn.onclick = async () => {
    const bodyEl = document.getElementById('replyBody');
    const body = bodyEl.value.trim();
    const fromEl = document.getElementById('replyFrom');
    const from = fromEl ? fromEl.value.trim() : state.fromNumber;
    const statusEl = document.getElementById('sendStatus');
    if (!body) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = 'Type a message first.';
      return;
    }
    if (!from) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = 'Enter a From number to send.';
      return;
    }
    sendBtn.disabled = true;
    statusEl.style.color = 'var(--text-muted)';
    statusEl.textContent = 'Sending...';
    const r = await fetch('/api/send', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ to: phone, body, from })
    });
    const j = await r.json();
    sendBtn.disabled = false;
    if (!r.ok) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = j.error || 'Send failed.';
      return;
    }
    statusEl.style.color = 'var(--accent)';
    statusEl.textContent = `Sent (${j.status || 'queued'}).`;
    bodyEl.value = '';
    loadConversation(phone);
  };
}

async function loadConversation(phone) {
  const threadEl = document.getElementById('chatThread');
  try {
    const r = await fetch(`/api/conversation/${encodeURIComponent(phone)}`);
    const j = await r.json();
    if (state.activePhone !== phone || !threadEl) return;
    if (!r.ok) {
      threadEl.innerHTML = `<div class="lead-chat-empty" style="color:var(--red);">${(j.error || 'Could not load conversation.').replace(/</g,'&lt;')}</div>`;
      return;
    }
    threadEl.innerHTML = renderChatThread(j.messages || []);
    threadEl.scrollTop = threadEl.scrollHeight;
  } catch (e) {
    if (threadEl) threadEl.innerHTML = `<div class="lead-chat-empty" style="color:var(--red);">Could not load conversation.</div>`;
  }
}

async function loadLeadDetail(phone) {
  const col = document.getElementById('leadDetailCol');
  const rec = await (await fetch(`/api/contacts/${encodeURIComponent(phone)}`)).json();
  if (state.activePhone !== phone || !col) return;

  const toLocalInput = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const fromLocalInput = (val) => val ? new Date(val).toISOString() : '';

  const fmtLastUpdate = (iso) => {
    if (!iso) return 'N/A';
    const d = new Date(iso);
    if (isNaN(d)) return 'N/A';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  };
  const campaignName = (() => {
    const c = state.campaigns.find(c => String(c.id) === String(rec.campaign_id));
    return c ? (c.market ? `${c.name} (${c.market})` : c.name) : 'None assigned';
  })();

  col.innerHTML = `
    <div class="lead-detail-section">
      <div class="lead-detail-heading">Summary</div>
      <div class="info-list">
        <div class="info-row">
          <div class="lbl"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>Last update</div>
          <div class="val">${fmtLastUpdate(rec.updated_at)}</div>
        </div>
        <div class="info-row">
          <div class="lbl"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg></span>Campaign</div>
          <div class="val">${campaignName}</div>
        </div>
        <div class="info-row">
          <div class="lbl"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></span>Deal revenue</div>
          <div class="val">${fmtMoney(rec.revenue || 0)}</div>
        </div>
      </div>
    </div>

    <div class="lead-detail-section">
      <div class="lead-detail-heading">Lead status</div>
      <div class="field">
        <label>Status</label>
        <select id="statusSelect">
          ${STATUSES.map(s => `<option value="${s}" ${rec.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Campaign / batch</label>
        <select id="campaignSelect">
          <option value="">(none)</option>
          ${state.campaigns.map(c => `<option value="${c.id}" ${String(rec.campaign_id)===String(c.id)?'selected':''}>${c.name}${c.market?` (${c.market})`:''}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Market / Source</label>
        <input type="text" id="marketInput" value="${rec.market || ''}" placeholder="e.g. Cape Coral FL, Ohio SMS blast" />
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="notesInput" placeholder="Deal notes, callback times, ARV, etc.">${rec.notes || ''}</textarea>
      </div>
    </div>

    <div class="lead-detail-section">
      <div class="lead-detail-heading">Deal timeline</div>
      <div class="field" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="skipBadInput" style="width:auto;" ${rec.skip_bad ? 'checked' : ''} />
        <label style="margin:0;" for="skipBadInput">Bad skip trace (wrong number, disconnected)</label>
      </div>
      <div class="field">
        <label>Positive engagement (seller dropped price)</label>
        <input type="datetime-local" id="posEngagementInput" value="${toLocalInput(rec.positive_engagement_at)}" />
      </div>
      <div class="field">
        <label>Purchase agreement sent</label>
        <input type="datetime-local" id="offerSentInput" value="${toLocalInput(rec.offer_sent_at)}" />
      </div>
      <div class="field">
        <label>Contract executed</label>
        <input type="datetime-local" id="contractAtInput" value="${toLocalInput(rec.contract_at)}" />
      </div>
      <div class="field">
        <label>Revenue on this deal ($)</label>
        <input type="text" id="revenueInput" value="${rec.revenue || 0}" placeholder="0" />
      </div>
    </div>

    <button class="btn primary" id="saveContactBtn" style="width:100%;">Save lead</button>
  `;

  document.getElementById('saveContactBtn').onclick = async () => {
    const status = document.getElementById('statusSelect').value;
    const market = document.getElementById('marketInput').value;
    const notes = document.getElementById('notesInput').value;
    const campaignId = document.getElementById('campaignSelect').value;
    const skipBad = document.getElementById('skipBadInput').checked;
    const revenue = parseFloat(document.getElementById('revenueInput').value) || 0;
    const positiveEngagementAt = fromLocalInput(document.getElementById('posEngagementInput').value);
    const offerSentAt = fromLocalInput(document.getElementById('offerSentInput').value);
    const contractAt = fromLocalInput(document.getElementById('contractAtInput').value);
    await fetch(`/api/contacts/${encodeURIComponent(phone)}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        status, market, notes, revenue, skipBad,
        campaignId: campaignId || null,
        positiveEngagementAt: positiveEngagementAt || null,
        offerSentAt: offerSentAt || null,
        contractAt: contractAt || null
      })
    });
    state.messages.forEach(m => { if (m.from === phone) { m.status = status; m.market = market; m.notes = notes; } });
    renderTable();
    closeDrawer();
  };
}

function openComposeDrawer() {
  state.activePhone = null;
  drawer.classList.remove('wide');
  drawerContent.innerHTML = `
    <div class="lead-detail-section" style="margin-bottom:18px;">
      <div class="lead-detail-heading">New message</div>
      <div style="color:var(--text-muted); font-size:12.5px; margin-bottom:14px;">${state.fromNumber ? `Sending from ${state.fromNumber}` : 'No From Number set globally, enter one below'}</div>
      <div class="field">
        <label>To</label>
        <input type="text" id="composeTo" placeholder="+15555550123" />
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="composeBody" placeholder="Type a message..."></textarea>
      </div>
      ${state.fromNumber ? '' : `
      <div class="field">
        <label>From number</label>
        <input type="text" id="composeFrom" placeholder="+15555550123" />
      </div>`}
    </div>
    <button class="btn primary" id="composeSendBtn" style="width:100%;">Send</button>
    <div id="composeStatus" style="font-size:12px; margin-top:8px;"></div>
  `;

  const sendBtn = document.getElementById('composeSendBtn');
  if (sendBtn) {
    sendBtn.onclick = async () => {
      const to = document.getElementById('composeTo').value.trim();
      const body = document.getElementById('composeBody').value.trim();
      const fromEl = document.getElementById('composeFrom');
      const from = fromEl ? fromEl.value.trim() : state.fromNumber;
      const statusEl = document.getElementById('composeStatus');
      if (!to || !body) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Both To and Message are required.';
        return;
      }
      if (!from) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Enter a From number to send.';
        return;
      }
      sendBtn.disabled = true;
      statusEl.style.color = 'var(--text-muted)';
      statusEl.textContent = 'Sending...';
      const r = await fetch('/api/send', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ to, body, from })
      });
      const j = await r.json();
      sendBtn.disabled = false;
      if (!r.ok) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = j.error || 'Send failed.';
        return;
      }
      statusEl.style.color = 'var(--accent)';
      statusEl.textContent = `Sent (${j.status || 'queued'}).`;
      document.getElementById('composeBody').value = '';
    };
  }

  overlay.classList.add('open');
  drawer.classList.add('open');
}

function closeDrawer() {
  overlay.classList.remove('open');
  drawer.classList.remove('open');
  drawer.classList.remove('wide');
  state.activePhone = null;
}
overlay.addEventListener('click', closeDrawer);
drawerClose.addEventListener('click', closeDrawer);

disconnectBtn.addEventListener('click', async () => {
  await fetch('/api/disconnect', { method: 'POST' });
  setConnected(false);
  render();
});
refreshBtn.addEventListener('click', () => {
  if (state.view === 'dashboard') loadDashboard();
  else if (state.view === 'campaigns') { loadCampaigns().then(renderCampaignsView); }
  else loadMessages();
});

function render() {
  if (!state.connected) {
    renderConnectGate();
  } else {
    renderCrmShell();
    loadCampaigns();
    loadMessages();
    loadOptOutCount();
  }
}

async function loadOptOutCount() {
  const countEl = document.getElementById('optOutCount');
  if (!countEl) return;
  try {
    const r = await fetch('/api/opt-outs');
    const j = await r.json();
    if (r.ok) countEl.textContent = j.count;
  } catch (e) { /* non-fatal, leave last known count showing */ }
}

document.getElementById('optOutsBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('optOutStatus');
  statusEl.textContent = 'Preparing file...';
  try {
    const r = await fetch('/api/opt-outs/export');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = j.error || 'Could not export opt-outs.';
      return;
    }
    const blob = await r.blob();
    const disposition = r.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename=([^;]+)/);
    const filename = match ? match[1].trim() : 'opt_outs.txt';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    statusEl.style.color = 'var(--text-muted)';
    statusEl.textContent = '';
    loadOptOutCount();
  } catch (e) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = 'Network error exporting opt-outs.';
  }
});

init();
</script>
