databases:
  - name: signalwire-crm-db
    plan: free

services:
  - type: web
    name: signalwire-crm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: signalwire-crm-db
          property: connectionString
      # Set these in the Render dashboard (Environment tab) after first deploy —
      # left blank here so secrets never live in the GitHub repo.
      - key: SIGNALWIRE_SPACE
        sync: false
      - key: SIGNALWIRE_PROJECT_ID
        sync: false
      - key: SIGNALWIRE_AUTH_TOKEN
        sync: false
      # Optional: the number messages get sent FROM when you reply in the CRM.
      # Can also be set per-session on the connect screen instead.
      - key: SIGNALWIRE_FROM_NUMBER
        sync: false
