databases:
  - name: signalwire-crm-db
    plan: free

services:
  - type: web
    name: signalwire-crm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: signalwire-crm-db
          property: connectionString
      - key: SIGNALWIRE_SPACE
        sync: false
      - key: SIGNALWIRE_PROJECT_ID
        sync: false
      - key: SIGNALWIRE_AUTH_TOKEN
        sync: false
